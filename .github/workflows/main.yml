name: Build natives (jnigen + per-OS) and PR prebuilt binaries

# Regenerates the JNI native C++ from the Java /*JNI*/ comments (jnigen), compiles the natives on each OS (they can
# only be built on their own platform), and opens a PR committing the fresh prebuilt libraries into the repo. The
# Steamworks SDK is pulled from the PUBLIC rlabrecque/SteamworksSDK mirror, so no token/secret is needed.
#
# After the PR merges, consume the fork either via JitPack at that commit, or by `mvn install`-ing java-wrapper +
# loader/gdx (Java packaging that bundles these committed binaries - no native build/SDK needed) into vendor/maven.

on:
  push:
    paths:
      - .github/workflows/main.yml
      - java-wrapper/src/main/java/**
      - java-wrapper/src/main/native/**
      - server/src/main/java/**
      - server/src/main/native/**
  workflow_dispatch: {}

env:
  # rlabrecque/SteamworksSDK mirrors each SDK release as a commit on `main` (no tags). The old pin 3ed0ffc6... was
  # SDK 1.57, which is too OLD for this wrapper: it uses SteamAPI_InitEx (SDK 1.59), DismissGamepadTextInput (~1.59),
  # ISteamUGC::GetNumSubscribedItems(bool) + GetSubscribedItems(...) new signatures (SDK 1.60), and
  # SteamUGCDetails_t::m_ulTotalFilesSize (~1.58). This is the current `main` HEAD (the latest mirrored SDK), which
  # has them all. Pinned to a commit for reproducibility - bump it to track newer SDKs.
  SDK: be6107f4b75bf996531415c53a6488a33a2a1be3
jobs:
  jnigen:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
    - name: Checkout Steamworks SDK (latest mirrored)
      uses: actions/checkout@v4
      with:
        repository: rlabrecque/SteamworksSDK
        ref: ${{ env.SDK }}
        path: ${{ github.workspace }}/sdk
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'maven'
    # One reactor build so inter-module deps resolve from the reactor: `server` depends on the `java-wrapper`
    # (steamworks4j) SNAPSHOT, and building them via separate --file invocations made Maven look for that SNAPSHOT in
    # a remote repo (central-portal-snapshots) and fail. A root build builds + installs every module in order.
    # -Dgpg.skip=true: the pom signs for Maven Central, but CI has no key and doesn't publish here. -DskipTests:
    # wrapper tests would need the natives/Steam, not built yet.
    - name: Build + install all modules (reactor handles inter-module deps)
      run: mvn -B install -Dgpg.skip=true -DskipTests
    - name: Package jnigen
      run: mvn -B package -Dgpg.skip=true -DskipTests --file jnigen/pom.xml
    - name: Run jnigen
      run: java -cp ${{ github.workspace }}/jnigen/target/jnigen.jar com.codedisaster.steamworks.jnigen.JNICodeGenerator
    - name: Upload the result of jnigen for java-wrapper
      uses: actions/upload-artifact@v4
      with:
        name: java-wrapper-cpp
        path: ${{ github.workspace }}/java-wrapper/src/main/native/
    - name: Upload the result of jnigen for server
      uses: actions/upload-artifact@v4
      with:
        name: server-cpp
        path: ${{ github.workspace }}/server/src/main/native/
  linux:
    needs: jnigen
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
    - name: Checkout Steamworks SDK (latest mirrored)
      uses: actions/checkout@v4
      with:
        repository: rlabrecque/SteamworksSDK
        ref: ${{ env.SDK }}
        path: ${{ github.workspace }}/sdk
    - name: Download the result of java-wrapper jnigen
      uses: actions/download-artifact@v4
      with:
        name: java-wrapper-cpp
        path: ${{ github.workspace }}/java-wrapper/src/main/native/
    - name: Download the result of server jnigen
      uses: actions/download-artifact@v4
      with:
        name: server-cpp
        path: ${{ github.workspace }}/server/src/main/native/
    - name: Set up premake for linux compile
      run: sudo apt-get install premake4
    - name: Compile linux project
      run: ./build-linux.sh
      working-directory: ${{ github.workspace }}/build-natives/
    - name: Upload built java-wrapper libraries
      uses: actions/upload-artifact@v4
      with:
        name: linux-java-wrapper-libraries
        path: ${{ github.workspace }}/java-wrapper/src/main/resources/*.so
    - name: Upload built server libraries
      uses: actions/upload-artifact@v4
      with:
        name: linux-server-libraries
        path: ${{ github.workspace }}/server/src/main/resources/*.so
  windows:
    needs: jnigen
    runs-on: windows-2022
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
    - name: Checkout Steamworks SDK (latest mirrored)
      uses: actions/checkout@v4
      with:
        repository: rlabrecque/SteamworksSDK
        ref: ${{ env.SDK }}
        path: ${{ github.workspace }}\sdk
    - name: Download the result of java-wrapper jnigen
      uses: actions/download-artifact@v4
      with:
        name: java-wrapper-cpp
        path: ${{ github.workspace }}\java-wrapper\src\main\native\
    - name: Download the result of server jnigen
      uses: actions/download-artifact@v4
      with:
        name: server-cpp
        path: ${{ github.workspace }}\server\src\main\native\
    - name: Set up premake for windows compile
      uses: abel0b/setup-premake@v2.3
      with:
        version: "5.0.0-beta2"
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1.3.1
    - name: Compile windows project
      run: .\build-win.bat vs2022
      working-directory: ${{ github.workspace }}\build-natives\
    - name: Upload built java-wrapper libraries
      uses: actions/upload-artifact@v4
      with:
        name: windows-java-wrapper-libraries
        path: ${{ github.workspace }}\java-wrapper\src\main\resources\*.dll
    - name: Upload built server libraries
      uses: actions/upload-artifact@v4
      with:
        name: windows-server-libraries
        path: ${{ github.workspace }}\server\src\main\resources\*.dll
  osx:
    needs: jnigen
    runs-on: macos-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
    - name: Checkout Steamworks SDK (latest mirrored)
      uses: actions/checkout@v4
      with:
        repository: rlabrecque/SteamworksSDK
        ref: ${{ env.SDK }}
        path: ${{ github.workspace }}/sdk
    - name: Download the result of java-wrapper jnigen
      uses: actions/download-artifact@v4
      with:
        name: java-wrapper-cpp
        path: ${{ github.workspace }}/java-wrapper/src/main/native/
    - name: Download the result of server jnigen
      uses: actions/download-artifact@v4
      with:
        name: server-cpp
        path: ${{ github.workspace }}/server/src/main/native/
    - name: Set up premake for mac compile
      uses: abel0b/setup-premake@v2.3
      with:
        version: "5.0.0-beta2"
        path: build-natives
    - name: Compile mac project
      run: ./build-osx.sh
      working-directory: ${{ github.workspace }}/build-natives/
    - name: Upload built java-wrapper libraries
      uses: actions/upload-artifact@v4
      with:
        name: osx-java-wrapper-libraries
        path: ${{ github.workspace }}/java-wrapper/src/main/resources/*.dylib
    - name: Upload built server libraries
      uses: actions/upload-artifact@v4
      with:
        name: osx-server-libraries
        path: ${{ github.workspace }}/server/src/main/resources/*.dylib
  pull:
    needs: [linux, windows, osx]
    runs-on: ubuntu-latest
    # create-pull-request needs a writable token; the repo default is read-only. Also enable
    # Settings -> Actions -> General -> "Allow GitHub Actions to create and approve pull requests".
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
    - name: Download the linux java-wrapper libraries
      uses: actions/download-artifact@v4
      with:
        name: linux-java-wrapper-libraries
        path: ${{ github.workspace }}/java-wrapper/src/main/resources/
    - name: Download the linux server libraries
      uses: actions/download-artifact@v4
      with:
        name: linux-server-libraries
        path: ${{ github.workspace }}/server/src/main/resources/
    - name: Download the windows java-wrapper libraries
      uses: actions/download-artifact@v4
      with:
        name: windows-java-wrapper-libraries
        path: ${{ github.workspace }}/java-wrapper/src/main/resources/
    - name: Download the windows server libraries
      uses: actions/download-artifact@v4
      with:
        name: windows-server-libraries
        path: ${{ github.workspace }}/server/src/main/resources/
    - name: Download the mac java-wrapper libraries
      uses: actions/download-artifact@v4
      with:
        name: osx-java-wrapper-libraries
        path: ${{ github.workspace }}/java-wrapper/src/main/resources/
    - name: Download the mac server libraries
      uses: actions/download-artifact@v4
      with:
        name: osx-server-libraries
        path: ${{ github.workspace }}/server/src/main/resources/
    - name: Create pull request
      uses: peter-evans/create-pull-request@v6
      with:
        commit-message: Update prebuilt libraries
        title: Updated Prebuilt Binaries
        body: Fresh build of binaries as a result of a "${{ github.event_name }}" event.
